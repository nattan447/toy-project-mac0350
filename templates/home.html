<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <link rel="stylesheet" href="../static/home.css">
    <script src="../static/scripts/home.js" defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js" integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F" crossorigin="anonymous"></script>


</head>
<body> 
<main>
    <div id="side-left-bar">
        <p 
        hx-get="/mostrar_perfil"
        hx-target="body" 
        hx-push-url="true"
        style="cursor:pointer"
        >Pefil</p>
        <p hx-get="/home"
        hx-target="body" 
        hx-push-url="true"
        style="cursor:pointer"
        >Home</p>
        <p hx-get="/listar_disciplinas"
                hx-target="#central-div"
                hx-swap="innerHTML" 
                hx-push-url="true"
            style="cursor:pointer">Disciplinas</p>
        <p><a href="/logout">Sair</a></p>
    </div>
    <div id="central-div">

        <div id="header-central-div">
            <p>Ferramentas</p>
            <button class="btn-home" id="btn-add-task">+ Add nova</button>
            <div id="pesquisa-bar">
            <input type="text" placeholder="pesquisar task" id="pesquisa-input"/>
            <img src="../static/images/lupa.png" alt="lupa de pesquisa" id="lupa"> 
            </div>
        </div>
        <div id="header-tasks">
            <p>tasks ativas</p>
            <p 
            >disciplina</p>
        </div>


    <div id="overlay" class="overlay">
    <form id="modal" hx-post="/add_tarefa" hx-target="#tasks" hx-on::after-request="this.reset()" hx-swap="beforeend">
        <div id="fechar-tool-modal"><p id="fechar-modal">fechar</p></div>
        <h1>Adicione a sua tarefa</h1>
        <input type="text" placeholder="nome da tarefa" class="input-task" required name="tarefa_nome">
        <input type="text" placeholder="Disciplina da tarefa" class="input-task" required name="disciplina_nome">
        <button id="btn-model" type="submit">Adicionar</button>
    </form>
    </div>

        <div id="tasks">
            {% if tasks_aluno_disciplinas %}
                {% for task, disciplina in tasks_aluno_disciplinas %}
                    <div class="task" id="task-{{ task.id }}">
                        <p style="font-weight: 600;">{{ task.nome }}</p>
                        <p style="color: var(--text-muted);">{{ disciplina.nome }}</p>
                        
                        <div style="display: flex; gap: 15px;">
                            <span onclick="abrirModalEdicao('{{ task.id }}', '{{ task.nome }}', '{{ disciplina.nome }}')" 
                                style="cursor:pointer; color: var(--primary); font-size: 0.9rem;">Editar</span>
                            
                            <span hx-delete="/deletar_task/{{ task.id }}" 
                                hx-target="closest .task" 
                                hx-swap="outerHTML"
                                style="cursor:pointer; color: #fb7185; font-size: 0.9rem;">Excluir</span>
                        </div>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <div id="overlay-edit" class="overlay" style="display: none;">
            <form id="modal-edit" >
                <div id="fechar-tool-modal">
                    <p onclick="fecharModalEdicao()" style="cursor:pointer">fechar</p>
                </div>
                
                <h1>Editar Tarefa</h1>
        
                <input type="text" name="task_nome" id="edit-nome" class="input-task" required>
                <input type="text" name="disciplina_nome" id="edit-disciplina" class="input-task" required>
                <button id="btn-model">Salvar Alterações</button>
            </form>
        </div>
    </div>
</main>

    
</body>
</html>
