{% extends "base.html" %}
{% block content %}
<div id="perfil-container" style="animation: fadeIn 0.4s ease; color: var(--text-main); max-width: 800px; margin: 0 auto; padding: 20px;">
    
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin-bottom: 10px;">
            Meu Perfil
        </h1>
        <p style="color: var(--text-muted);">Gerencie suas informações de estudante</p>
    </div>

    <div style="background: var(--bg-card); border-radius: 24px; border: 1px solid var(--input-border); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column;">
        
        <div style="background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%); padding: 40px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid var(--input-border);">
            
            <div style="width: 120px; height: 120px; background: var(--input-bg); border-radius: 50%; border: 4px solid var(--primary); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; position: relative;">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="width: 60px;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                </div>

            <h2 style="font-size: 1.5rem; margin: 0;">{{ aluno.nome }}</h2>
            <span style="background: var(--primary); color: white; font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;">
                Estudante Ativo
            </span>
        </div>

        <div style="padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            
            <div class="info-group">
                <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase;">E-mail Cadastrado</label>
                <div style="background: var(--input-bg); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--input-border);">
                    {{ aluno.email }}
                </div>
            </div>

            <div class="info-group">
                <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase;">Curso / Graduação</label>
                <div style="background: var(--input-bg); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--input-border);">
                    {{ aluno.curso }}
                </div>
            </div>

            <div class="info-group" style="grid-column: span 2;">
                <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase;">ID do Usuário</label>
                <div style="background: var(--input-bg); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--input-border); font-family: monospace; color: var(--primary);">
                    #{{ aluno.id }}
                </div>
            </div>
        </div>

        <div style="padding: 20px 40px; background: rgba(0,0,0,0.2); display: flex; justify-content: flex-end; gap: 15px;">
            <button class="btn-home" style="background: var(--input-bg); border: 1px solid var(--input-border);" hx-get="/home" hx-target="body" hx-push-url="true">
                Voltar
            </button>
            <button class="btn-home" onclick="alert('Funcionalidade de edição em breve!')">
                Editar Perfil
            </button>
        </div>
    </div>
</div>
{% endblock %}
<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    .info-group div {
        transition: border-color 0.3s;
    }
    .info-group div:hover {
        border-color: var(--primary) !important;
    }
</style>
