{% if tasks_aluno_disciplinas %}
    {% for task, disciplina in tasks_aluno_disciplinas %}
        <div class="task" id="task-{{ task.id }}">
            <p style="font-weight: 600;">{{ task.nome }}</p>
            <p style="color: var(--text-muted);">{{ disciplina.nome }}</p>
            
            <div style="display: flex; gap: 15px;">
                <span onclick="abrirModalEdicao('{{ task.id }}', '{{ task.nome }}', '{{ disciplina.nome }}')" 
                    style="cursor:pointer; color: var(--primary); font-size: 0.9rem;">Editar</span>
                
                <span hx-delete="/deletar_task/{{ task.id }}" 
                    hx-target="closest .task" 
                    hx-swap="outerHTML"
                    style="cursor:pointer; color: #fb7185; font-size: 0.9rem;">Excluir</span>
            </div>
        </div>
    {% endfor %}
{% else %}
    <p style="padding: 20px; color: var(--text-muted);">Nenhuma tarefa encontrada.</p>
{% endif %}
